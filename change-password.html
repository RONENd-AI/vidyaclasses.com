<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | Vidya Classes</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Unicons (Icons) -->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- Project Config -->
    <script src="js/firebase-config.js"></script>
    <style>
        .hidden { display: none !important; opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="dark-theme">
    <div id="particles"></div>
    
    <div class="login-container">
        <div class="card login-card fade-in">
            <div class="login-header">
                <div class="logo-icon">VTC</div>
                <h2>Change Password</h2>
                <p class="text-muted">Update your Vidya Classes account password.</p>
            </div>
            
            <form id="changePasswordForm">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" id="newPass" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" id="confirmPass" class="form-control" placeholder="Re-enter new password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;">
                    <i class="uil uil-key-skeleton"></i> Update Password
                </button>
                <div style="text-align: center;">
                    <a href="index.html" class="btn btn-outline" style="width: 100%;">
                        <i class="uil uil-arrow-left"></i> Cancel & Return to Dashboard
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- UI Elements -->
    <div id="toastContainer" class="toast-container"></div>
    <div id="loader" class="loader-overlay hidden">
        <div class="spinner"></div>
    </div>
    
    <script>
        const showLoader = () => document.getElementById('loader').classList.remove('hidden');
        const hideLoader = () => document.getElementById('loader').classList.add('hidden');
        const showToast = (message, type = 'success') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'check-circle' : 'exclamation-circle';
            toast.innerHTML = `<i class="uil uil-${icon}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
        };

        document.addEventListener('DOMContentLoaded', () => {
            showLoader();
            
            // Check auth state to ensure ONLY logged in users can change password
            if (!window.auth) {
                alert("Firebase failed to load or configure.");
                window.location.href = 'index.html';
                return;
            }

            window.auth.onAuthStateChanged(user => {
                hideLoader();
                if (!user) {
                    alert("Unauthorized! You must be logged in to change your password.");
                    window.location.href = 'index.html';
                }
            });

            document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPass = document.getElementById('newPass').value;
                const confirmPass = document.getElementById('confirmPass').value;
                
                if (newPass !== confirmPass) {
                    return showToast("Passwords do not match!", "error");
                }
                
                showLoader();
                try {
                    const user = window.auth.currentUser;
                    if (user) {
                        await user.updatePassword(newPass);
                        showToast("Password updated successfully!", "success");
                        setTimeout(() => window.location.href = 'index.html', 1500);
                    } else {
                        showToast("Session expired. Please log in again.", "error");
                    }
                } catch (err) {
                    if (err.code === 'auth/requires-recent-login') {
                        showToast("For security, please logout and log back in before changing your password.", "error");
                    } else {
                        showToast("Error: " + err.message, "error");
                    }
                }
                hideLoader();
            });
        });
    </script>
</body>
</html>
